{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}


{% block content %}


<h3>Форма создания вложения</h3>




<form  enctype="multipart/form-data" action="{% url 'create_attachment' %}" method="POST">
  <div class="mb-3">
      {{ form|crispy}}
    {% csrf_token %}

  </div>

  <button type="submit" class="btn btn-primary">Добавить</button>
</form>


{% endblock %}
