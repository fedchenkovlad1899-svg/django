{% extends "base.html" %}
{% load static %}
{% block content %}





<table class="table">
 <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">Name</th>
      <th scope="col">email</th>
      <th scope="col">phone</th>
    </tr>
  </thead>
  <tbody>
  {% for user in users %}
    <tr>
      <td>{{ user.id }}</td>
      <td>{{ user.username }}</td>
      <td>{{ user.email}}</td>
      <td>{{ user.phone}}</td>
    </tr>
    {% endfor %}

  </tbody>
</table>



{% endblock %}
