{% extends "base.html" %}
{% block content %}

<table class="table">
  <thead>
    <tr>
      <th scope="col">Task_name</th>
      <th scope="col">Status</th>
      <th scope="col">Priority</th>
    </tr>
  </thead>
  <tbody>
  {%for task in tasks%}
    <tr>
      <td>{{ task.task_name }}</td>
      <td>{{ task.status }}</td>
      <td>{{ task.priority }}</td>
    </tr>
{% endfor %}

  </tbody>
</table>

{% endblock %}
